<!DOCTYPE html>
<html lang="zh-CN">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>文字排版生成器 V2</title>
  <style>
    :root {
      --bg: #0b0c0f;
      --panel: rgba(18, 19, 24, 0.92);
      --card: rgba(255, 255, 255, 0.055);
      --line: rgba(255, 255, 255, 0.13);
      --line-strong: rgba(255, 255, 255, 0.28);
      --text: #f6f2ea;
      --muted: rgba(246, 242, 234, 0.62);
      --weak: rgba(246, 242, 234, 0.38);
      --gold: #e7c86f;
      --blue: #9db8ff;
      --radius-lg: 24px;
      --radius-md: 16px;
      --shadow: 0 24px 80px rgba(0, 0, 0, 0.42);
    }

    * {
      box-sizing: border-box;
    }

    body {
      margin: 0;
      min-height: 100vh;
      background:
        radial-gradient(circle at 15% 10%, rgba(231, 200, 111, 0.15), transparent 28%),
        radial-gradient(circle at 78% 20%, rgba(157, 184, 255, 0.16), transparent 30%),
        radial-gradient(circle at 52% 85%, rgba(255, 255, 255, 0.06), transparent 30%),
        var(--bg);
      color: var(--text);
      font-family: -apple-system, BlinkMacSystemFont, "PingFang SC", "Hiragino Sans GB", "Microsoft YaHei", "Noto Sans SC", Arial, sans-serif;
      overflow-x: hidden;
    }

    .app {
      width: 100%;
      min-height: 100vh;
      display: grid;
      grid-template-columns: 410px minmax(0, 1fr);
    }

    .sidebar {
      height: 100vh;
      overflow-y: auto;
      padding: 28px;
      border-right: 1px solid var(--line);
      background: rgba(8, 9, 12, 0.72);
      backdrop-filter: blur(22px);
    }

    .brand-row {
      display: flex;
      align-items: center;
      gap: 12px;
      margin-bottom: 18px;
    }

    .logo-mark {
      width: 42px;
      height: 42px;
      border-radius: 15px;
      background: linear-gradient(135deg, rgba(231, 200, 111, 1), rgba(157, 184, 255, 0.9));
      display: grid;
      place-items: center;
      color: #0b0c0f;
      font-weight: 900;
      box-shadow: 0 12px 36px rgba(231, 200, 111, 0.18);
    }

    .eyebrow {
      font-size: 11px;
      letter-spacing: 0.18em;
      text-transform: uppercase;
      color: var(--weak);
      margin-bottom: 5px;
    }

    h1 {
      margin: 0;
      font-size: 24px;
      letter-spacing: -0.02em;
      line-height: 1.16;
    }

    .subtitle {
      margin: 0 0 24px;
      color: var(--muted);
      font-size: 13px;
      line-height: 1.65;
    }

    .section {
      padding: 17px;
      border: 1px solid var(--line);
      border-radius: var(--radius-lg);
      background: var(--card);
      margin-bottom: 14px;
    }

    .section-title {
      display: flex;
      justify-content: space-between;
      align-items: center;
      gap: 10px;
      margin-bottom: 12px;
    }

    .section-title strong {
      font-size: 13px;
      letter-spacing: 0.06em;
      color: rgba(246, 242, 234, 0.88);
    }

    .mini-note {
      font-size: 11px;
      color: var(--weak);
    }

    textarea {
      width: 100%;
      min-height: 142px;
      resize: vertical;
      border: 1px solid var(--line);
      border-radius: var(--radius-md);
      background: rgba(0, 0, 0, 0.24);
      color: var(--text);
      outline: none;
      padding: 14px;
      font-size: 18px;
      line-height: 1.6;
      transition: border-color 0.18s ease, background 0.18s ease;
    }

    textarea:focus {
      border-color: var(--line-strong);
      background: rgba(0, 0, 0, 0.34);
    }

    .chips {
      display: flex;
      flex-wrap: wrap;
      gap: 8px;
      margin-top: 12px;
    }

    .chip {
      border: 1px solid var(--line);
      background: rgba(255, 255, 255, 0.04);
      color: var(--muted);
      padding: 7px 10px;
      border-radius: 999px;
      font-size: 12px;
      cursor: pointer;
      transition: 0.18s ease;
    }

    .chip:hover {
      color: var(--text);
      border-color: var(--line-strong);
      transform: translateY(-1px);
    }

    .segmented {
      display: grid;
      grid-template-columns: 1fr 1fr;
      gap: 8px;
    }

    button, select, input {
      font: inherit;
    }

    .pill-btn {
      border: 1px solid var(--line);
      background: rgba(255, 255, 255, 0.04);
      color: var(--muted);
      border-radius: var(--radius-md);
      padding: 11px 12px;
      cursor: pointer;
      transition: 0.18s ease;
    }

    .pill-btn:hover {
      border-color: var(--line-strong);
      color: var(--text);
    }

    .pill-btn.active {
      color: #101113;
      background: var(--text);
      border-color: var(--text);
      font-weight: 700;
    }

    .style-grid {
      display: grid;
      grid-template-columns: 1fr;
      gap: 10px;
    }

    .style-card {
      position: relative;
      border: 1px solid var(--line);
      background: rgba(255, 255, 255, 0.04);
      border-radius: var(--radius-md);
      padding: 12px;
      cursor: pointer;
      transition: 0.18s ease;
      overflow: hidden;
      min-height: 76px;
    }

    .style-card:hover {
      border-color: var(--line-strong);
      transform: translateY(-1px);
    }

    .style-card.active {
      border-color: rgba(231, 200, 111, 0.82);
      box-shadow: inset 0 0 0 1px rgba(231, 200, 111, 0.25), 0 12px 38px rgba(231, 200, 111, 0.08);
      background: rgba(231, 200, 111, 0.075);
    }

    .style-name {
      font-size: 14px;
      font-weight: 700;
      margin-bottom: 5px;
    }

    .style-desc {
      color: var(--weak);
      font-size: 12px;
      line-height: 1.35;
      max-width: 68%;
    }

    .style-preview {
      position: absolute;
      right: 15px;
      top: 10px;
      bottom: 10px;
      width: 78px;
      color: rgba(246, 242, 234, 0.58);
      font-family: "Songti SC", "Noto Serif SC", serif;
      pointer-events: none;
    }

    .preview-minimal {
      font-size: 15px;
      letter-spacing: 0.18em;
      line-height: 1.9;
    }

    .preview-japanese {
      writing-mode: vertical-rl;
      font-size: 15px;
      letter-spacing: 0.22em;
    }

    .preview-experimental span {
      position: absolute;
    }

    .preview-poetic {
      font-size: 13px;
      line-height: 2.4;
      opacity: 0.72;
    }

    select {
      width: 100%;
      border: 1px solid var(--line);
      border-radius: var(--radius-md);
      padding: 12px 13px;
      background: rgba(0, 0, 0, 0.24);
      color: var(--text);
      outline: none;
    }

    .color-row {
      display: grid;
      grid-template-columns: 56px 1fr auto;
      align-items: center;
      gap: 10px;
    }

    input[type="color"] {
      width: 54px;
      height: 42px;
      padding: 0;
      border: 1px solid var(--line);
      border-radius: 13px;
      background: transparent;
      cursor: pointer;
    }

    .color-code {
      color: var(--muted);
      font-size: 13px;
    }

    .reset-btn {
      border: 1px solid var(--line);
      border-radius: 12px;
      background: rgba(255, 255, 255, 0.04);
      color: var(--muted);
      padding: 9px 10px;
      cursor: pointer;
    }

    .range-row {
      margin-top: 14px;
    }

    .range-label {
      display: flex;
      justify-content: space-between;
      align-items: center;
      font-size: 12px;
      color: var(--muted);
      margin-bottom: 7px;
    }

    input[type="range"] {
      width: 100%;
      accent-color: var(--gold);
    }

    .aid-card {
      border: 1px solid rgba(157, 184, 255, 0.22);
      background: rgba(157, 184, 255, 0.07);
      border-radius: var(--radius-md);
      padding: 12px;
      color: rgba(246, 242, 234, 0.7);
      font-size: 12px;
      line-height: 1.6;
    }

    .actions {
      display: grid;
      grid-template-columns: 1fr;
      gap: 10px;
      margin-top: 16px;
    }

    .primary {
      border: none;
      border-radius: 18px;
      padding: 14px
